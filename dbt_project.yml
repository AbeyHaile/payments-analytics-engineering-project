# Name your project! Project names should contain only lowercase characters
# and underscores. A good package name should reflect your organization's
# name or the intended use of these models.
name: 'nala_analytics_assessment'
version: '1.0.0'

# Select the dbt profile used for the project.
profile: "snowflake"

# Select the required dbt version to run models
require-dbt-version: [">=1.0.0", "<2.0.0"]

# These configurations specify where dbt should look for different types of files.
# The `model-paths` config, for example, states that models in this project can be
# found in the "models/" directory.
model-paths: ["dbt_project/models"]

# directories to be removed by `dbt clean`
clean-targets:
  - "target"
  - "dbt_packages"
  - "logs"

# Configuring models
# Full documentation: https://docs.getdbt.com/docs/configuring-models

# In this example config, we tell dbt to build all models in the example/
# directory as views. These settings can be overridden in the individual model
# files using the `{{ config(...) }}` macro.
models:
  nala_analytics_assessment:
    # Config indicated by + and applies to all files under models/staging/
    staging:
      +materialized: view
      backend:
        +schema: backend
      fincrime:
        +schema: fincrime
      amplitude:
        +schema: amplitude
    
    # Intermediate Layer: Views or Ephemeral for internal logic
    intermediate:
      +materialized: view
      backend:
        +schema: intermediate_backend
      fincrime:
        +schema: intermediate_fincrime

    # Marts Layer: Performance layer using incremental strategy
    mart:
      +materialized: incremental
      +incremental_strategy: delete+insert
      
      core:
        +schema: analytics_core
      finance:
        +schema: analytics_finance
      fincrime:
        +schema: analytics_fincrime
      ops:
        +schema: analytics_ops